
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Task & Assignment Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<a class="skip-link" href="#main">Skip to main content</a>

<div class="wrap">

<header class="site-header">
<h1>Student Task & Assignment Tracker</h1>
<p class="sub">Track assignments, due dates, priority, category, and completion status.</p>
</header>

<main id="main">
<div class="grid">

<section class="card form" aria-labelledby="formTitle">
<h2 id="formTitle">Add Assignment</h2>

<form id="taskForm" novalidate>

<input type="hidden" id="taskId" />

<label for="title">Title *</label>
<input type="text" id="title" required />

<div class="row">
<div>
<label for="dueDate">Due Date *</label>
<input type="date" id="dueDate" required />
</div>

<div>
<label for="priority">Priority</label>
<select id="priority">
<option value="low">Low</option>
<option value="medium" selected>Medium</option>
<option value="high">High</option>
</select>
</div>
</div>

<label for="category">Category</label>
<select id="category">
<option value="Homework">Homework</option>
<option value="Exam">Exam</option>
<option value="Project">Project</option>
<option value="Reading">Reading</option>
<option value="Other" selected>Other</option>
</select>

<div class="inline">
<input type="checkbox" id="completed" />
<label for="completed">Completed</label>
</div>

<div class="actions">
<button type="submit">Save Assignment</button>
<button type="button" class="secondary" id="cancelBtn" hidden>Cancel Edit</button>
<button type="button" class="danger" id="clearAllBtn">Clear All</button>
</div>

<p class="msg" id="formMsg"></p>

</form>
</section>

<section class="card">
<h2>Dashboard</h2>

<h3>Overdue</h3>
<ul id="listOverdue" class="list"></ul>

<h3>Due Today</h3>
<ul id="listToday" class="list"></ul>

<h3>Due Soon</h3>
<ul id="listSoon" class="list"></ul>

<h3>Upcoming</h3>
<ul id="listUpcoming" class="list"></ul>

<h3>Completed</h3>
<ul id="listCompleted" class="list"></ul>

</section>

</div>
</main>

<footer class="foot">
<p class="muted">IT‑488 demo build — Modern Glass theme</p>
</footer>

</div>

<script src="app.js"></script>
</body>
</html>
